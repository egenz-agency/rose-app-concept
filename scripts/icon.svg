<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#2a0512"/>
      <stop offset="55%" stop-color="#12030a"/>
      <stop offset="100%" stop-color="#070205"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="38%">
      <stop offset="0%" stop-color="#ff3355" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ff3355" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="petal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d6294f"/>
      <stop offset="100%" stop-color="#8a1528"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="205" r="180" fill="url(#glow)"/>

  <!-- Rose emblem (scaled from the app's rose mark) -->
  <g transform="translate(160,116) scale(6)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Stem -->
    <line x1="16" y1="22" x2="16" y2="44" stroke="#8a1528" stroke-width="1.4"/>
    <!-- Leaves -->
    <path d="M16 32 Q10 28 10 22" stroke="#3f7d3a" stroke-width="1.3" fill="none"/>
    <path d="M16 32 Q22 28 22 22" stroke="#3f7d3a" stroke-width="1.3" fill="none"/>
    <!-- Back petals -->
    <path d="M16 8 C16 4 20 2 22 5 C24 8 21 13 16 14 Z" fill="url(#petal)" stroke="#c9a84c" stroke-width="0.7"/>
    <path d="M16 8 C16 4 12 2 10 5 C8 8 11 13 16 14 Z" fill="url(#petal)" stroke="#c9a84c" stroke-width="0.7"/>
    <path d="M16 8 C20 7 24 10 23 14 C22 18 17 19 16 18 Z" fill="url(#petal)" stroke="#c9a84c" stroke-width="0.7"/>
    <path d="M16 8 C12 7 8 10 9 14 C10 18 15 19 16 18 Z" fill="url(#petal)" stroke="#c9a84c" stroke-width="0.7"/>
    <!-- Front petal -->
    <path d="M16 10 C19 9 22 12 21 16 C20 20 17 21 16 20 C15 21 12 20 11 16 C10 12 13 9 16 10 Z" fill="#b51e3c" stroke="#e8b75a" stroke-width="0.8"/>
    <!-- Center -->
    <circle cx="16" cy="14" r="3.4" fill="#d6294f" stroke="#e8b75a" stroke-width="0.8"/>
    <circle cx="16" cy="14" r="1.4" fill="#f2d27a"/>
  </g>
</svg>
